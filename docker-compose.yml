services:
  db:
    image: postgres:17
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - internal
  dj:
    build:
      context: ./django_app
      args: # Django collectstatic needs these during the build time.
      # In the Dockerfile, these will be promoted to environment
      # variables
        - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
        - DJANGO_CSRF_TRUSTED_ORIGINS=${DJANGO_CSRF_TRUSTED_ORIGINS}
        - DB_ENGINE=${DB_ENGINE}
    volumes:
      - dj_static:/usr/src/app/staticfiles
      - dj_media:/usr/src/app/media
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - internal
  digitalclinic-nginx:
    image: nginx:latest
    volumes:
      - /root/digital_clinic/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      # Django Static
      - dj_static:/usr/share/nginx/static/:ro

      # Django Media
      - dj_media:/usr/share/nginx/media/:ro
    depends_on:
      - dj
    networks:
      - master-nginx-network
      - internal
volumes:
  db_data:
  dj_static:
  dj_media:

networks:
  internal:
  master-nginx-network:
    external: true
